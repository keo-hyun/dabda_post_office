<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dabda Post Office</title>
    <link id="appStylesheet" rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="https://use.typekit.net/awz3imm.css">
    <script>
      const assetVersion = new URLSearchParams(window.location.search).get('v') || '20260319-cache1';
      const stylesheet = document.getElementById('appStylesheet');

      if (stylesheet) {
        stylesheet.href = `./styles.css?v=${assetVersion}`;
      }

      window.__APP_ASSET_VERSION__ = assetVersion;
    </script>
    <script>
        (function(d) {
          var config = {
            kitId: 'awz3imm',
            scriptTimeout: 3000,
            async: true
          },
          h = d.documentElement,
          t = setTimeout(function() {
            h.className = h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive";
          }, config.scriptTimeout),
          tk = d.createElement("script"),
          f = false,
          s = d.getElementsByTagName("script")[0],
          a;

          h.className += " wf-loading";
          tk.src = 'https://use.typekit.net/' + config.kitId + '.js';
          tk.async = true;

          tk.onload = tk.onreadystatechange = function() {
            a = this.readyState;
            if (f || (a && a != "complete" && a != "loaded")) return;
            f = true;
            clearTimeout(t);
            try { Typekit.load(config); } catch(e) {}
          };

          s.parentNode.insertBefore(tk, s);
        })(document);
      </script>
  </head>
  <body>
    <main class="page">
      <div id="app"></div>
    </main>
    <script type="module">
      const assetVersion = window.__APP_ASSET_VERSION__ || '20260319-cache1';
      const appScript = document.createElement('script');
      appScript.type = 'module';
      appScript.src = `./app.js?v=${assetVersion}`;
      document.body.appendChild(appScript);
    </script>
  </body>
</html>
